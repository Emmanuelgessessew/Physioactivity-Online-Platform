<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link
      rel="stylesheet"
      href="{{ url_for('static', filename='css/employee.css') }}"
    />
    <title>PhysioActivity - Employee Portal</title>
  </head>
  <body>
    <!-- Navbar -->
    <header class="navbar">
      <div class="container">
        <a href="{{ url_for('index') }}" class="logo">PhysioActivity</a>
        <nav>
          <ul>
            <!-- Notifications Dropdown -->
            <li id="notifications" class="dropdown">
              <button id="notificationButton">Notifications</button>
              <div id="notificationDropdown" class="dropdown-content">
                {% if notifications %} {% for notification in notifications %}
                <p>
                  <strong>{{ notification.sender }}:</strong> {{
                  notification.message }}
                </p>
                {% endfor %} {% else %}
                <p>No new notifications.</p>
                {% endif %}
              </div>
            </li>
            <!-- Logout Button -->
            <li><a href="{{ url_for('logout') }}">Logout</a></li>
          </ul>
        </nav>
      </div>
    </header>

    <!-- Employee Portal Section -->
    <section class="employee-portal">
      <div class="container">
        <h2>Submit a Physiotherapy Request</h2>

        <!-- Physio Request Form -->
        <form
          id="physioForm"
          method="POST"
          action="{{ url_for('submit_request') }}"
        >
          <label for="name">Full Name</label>
          <input
            type="text"
            id="name"
            name="name"
            placeholder="Enter your full name"
            required
          />

          <label for="workId">Work ID</label>
          <input
            type="text"
            id="workId"
            name="workId"
            placeholder="Enter your work ID"
            required
          />

          <label for="date">Preferred Date</label>
          <input type="date" id="date" name="preferred_date" required />

          <label for="time">Preferred Time</label>
          <input type="time" id="time" name="preferred_time" required />

          <!-- Add Submit Button -->
          <button type="submit">Send Request</button>
        </form>
      </div>
    </section>
  </body>
</html>
